<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Willow — Mental Health Support</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-left">
        <div class="logo">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 21c-4 0-7-3-7-7C4 7 11 3 20 3c0 9-4 16-9 18z"/><path d="M11 21C11 14 14 8 20 3"/>
          </svg>
        </div>
        <div>
          <h1>Willow</h1>
          <p class="subtitle">Mental Health Support</p>
        </div>
      </div>
      <div class="header-right">
        <button class="btn-icon" id="theme-btn" title="Toggle dark mode" aria-label="Toggle dark mode">
          <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
        <button class="btn-icon" id="settings-btn" title="Settings" aria-label="Settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
        <button class="btn-icon" id="clear-btn" title="New conversation" aria-label="New conversation">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
          </svg>
        </button>
      </div>
    </header>

    <div class="settings-panel" id="settings-panel">
      <div class="settings-content">
        <label for="api-url">Backend API URL</label>
        <input type="text" id="api-url" placeholder="http://localhost:8000" />
        <label for="api-endpoint">Chat Endpoint</label>
        <input type="text" id="api-endpoint" placeholder="/chat" />
        <div class="settings-actions">
          <button class="btn-secondary" id="settings-cancel">Cancel</button>
          <button class="btn-primary" id="settings-save">Save</button>
        </div>
      </div>
    </div>

    <main class="chat-area" id="chat-area" role="log" aria-live="polite" aria-busy="false" aria-label="Conversation">
      <div class="welcome">
        <div class="welcome-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 21c-4 0-7-3-7-7C4 7 11 3 20 3c0 9-4 16-9 18z"/><path d="M11 21C11 14 14 8 20 3"/>
          </svg>
        </div>
        <h2>Welcome to Willow</h2>
        <p>A safe space to talk about how you're feeling. I'm here to listen and help with questions about anxiety, depression, stress, and more.</p>
        <div class="quick-prompts">
          <button class="prompt-chip" data-prompt="I've been feeling really anxious lately">Feeling anxious</button>
          <button class="prompt-chip" data-prompt="How can I manage stress at work?">Managing stress</button>
          <button class="prompt-chip" data-prompt="I'm having trouble sleeping because of my worries">Trouble sleeping</button>
          <button class="prompt-chip" data-prompt="What are some coping strategies for depression?">Coping strategies</button>
        </div>
      </div>
    </main>

    <footer class="input-area">
      <div class="input-wrapper">
        <textarea
          id="message-input"
          placeholder="Type your message..."
          rows="1"
          autofocus
          aria-label="Message"
        ></textarea>
        <button class="btn-send" id="send-btn" disabled title="Send" aria-label="Send message">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <p class="disclaimer">This chatbot provides general information and is not a substitute for professional mental health care.</p>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
